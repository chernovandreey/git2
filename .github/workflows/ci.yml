name: Run Ruff Linter

on: [push]  # Запускает workflow при push

jobs:
  lint:
    runs-on: ubuntu-latest  # Эту строку нужно оставить

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.2.2  # Используем последнюю стабильную версию

      - name: Install Ruff
        run: |
          pip install ruff  # Устанавливаем линтер Ruff

      - name: Run Ruff
        run: |
          ruff check --fix .  # Запускаем линтинг и исправление для всех файлов в текущей директории

      - name: Commit changes
        run: |
          git config --local user.email "you@example.com"  # Настройка email для git
          git config --local user.name "Your Name"  # Настройка имени для git
          git add .  # Добавляем изменения
          git commit -m "Fix unused imports" || echo "No changes to commit"  # Коммитим изменения, если есть

      - name: Pull before Push
        run: |
          git pull origin main  # Получить последние изменения из ветки main

      - name: Push changes
        run: |
          git push origin HEAD:main  # Пушим изменения в ветку main