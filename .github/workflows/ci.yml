name: Run Ruff Linter

on: [push]  # Запускайте workflow при push

jobs:
  lint:
    runs-on: ubuntu-latest  # Эту строку нужно оставить

    steps:
      - name: Install Ruff
        run: |
          pip install ruff  # Устанавливаем линтер Ruff

      - name: Run Ruff
        run: |
          ruff check --fix .  # Запускаем линтинг для всех файлов 
